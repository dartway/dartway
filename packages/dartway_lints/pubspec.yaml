name: dartway_lints
description: "Custom lint rules enforcing DartWay conventions: the UI kit is the single source of styles — raw Color/TextStyle/BorderRadius and direct theme access are flagged outside ui_kit/."
version: 0.1.0
repository: https://github.com/dartway/dartway

resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  analyzer: '>=7.4.0 <9.0.0'
  custom_lint_builder: ^0.8.0
