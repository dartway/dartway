name: dartway_lints
description: "Custom lint rules enforcing DartWay conventions: the UI kit is the single source of styles — raw Color/TextStyle/BorderRadius and direct theme access are flagged outside ui_kit/."
version: 0.1.0
repository: https://github.com/dartway/dartway
homepage: https://dartway.dev
issue_tracker: https://github.com/dartway/dartway/issues
topics: [dartway, lints, linter, flutter]

resolution: workspace

environment:
  sdk: ^3.9.0

dependencies:
  # analyzer is capped at <9 by custom_lint_builder itself (0.8.1, the latest,
  # requires ^8.0.0), so the newest analyzer is out of reach for every
  # custom_lint plugin — not just this one. The lower bound must be >=8.0.0 for
  # the same reason: with 7.4.0 the package does not resolve at all.
  analyzer: '>=8.0.0 <9.0.0'
  custom_lint_builder: ^0.8.1
