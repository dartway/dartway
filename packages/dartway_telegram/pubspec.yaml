name: dartway_telegram
description: "Telegram Mini App integration for DartWay apps: initialize the Telegram WebApp, read its safe-area insets and the Telegram user id. Optional — an app that is not a Mini App never depends on it."
version: 0.1.0
repository: https://github.com/dartway/dartway

resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  telegram_web_app: ^0.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
