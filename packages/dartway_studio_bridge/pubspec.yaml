version: 0.1.0
repository: https://github.com/dartway/dartway
homepage: https://dartway.dev
issue_tracker: https://github.com/dartway/dartway/issues
topics: [dartway, flutter, tooling, preview]

resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
