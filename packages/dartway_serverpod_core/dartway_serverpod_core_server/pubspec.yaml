name: dartway_serverpod_core_server
description: "Server side of the DartWay core — a Serverpod module: generic model-driven CRUD with realtime subscriptions, declarative access/validation configs, phone auth, cloud storage (S3/MinIO) and Telegram alerts."
version: 0.1.0
repository: https://github.com/dartway/dartway

resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  serverpod: ^3.4.8

  dartway_serverpod_core_shared: ^0.1.0

  collection: ^1.19.1
  crypto: ^3.0.6
  googleapis_auth: ^2.3.3
  http: ^1.5.0
  bcrypt: ^1.1.3
  minio: ^3.5.8
  mime: ^2.0.0
  amazon_cognito_identity_dart_2: ^4.0.0
  path: ^1.9.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.15
