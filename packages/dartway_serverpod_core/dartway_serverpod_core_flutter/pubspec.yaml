name: dartway_serverpod_core_flutter
description: "Flutter side of the DartWay core: typed realtime data layer over the Serverpod module (watchModelList/saveModel), session management, connection-aware error handling and out-of-the-box context-rich alerting."
version: 0.1.0
repository: https://github.com/dartway/dartway

resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

  serverpod_client: ^3.4.8

  dartway_flutter: ^0.1.0
  dartway_serverpod_core_client: ^0.1.0
  dartway_serverpod_core_shared: ^0.1.0

  collection: ^1.19.1
  flutter_riverpod: ^3.0.0

  heif_converter: '>=1.0.0 <2.0.0'
  image: '>=4.1.4 <5.0.0'
  image_picker: '>=1.0.4 <2.0.0'
  intl: '>=0.19.0 <1.0.0'
  path: '>=1.9.0 <2.0.0'
  path_provider: '>=2.1.3 <3.0.0'
  shared_preferences: ^2.5.3
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
