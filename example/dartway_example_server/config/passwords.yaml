# Local development passwords. This file is gitignored — not under version control.
development:
  database: 'dartway_dev_pw'
  serviceSecret: 'dev-service-secret-change-me'
  # Salts required by DartWay auth (see DwAuthConfig on the server).
  dwAuthKeySalt: 'dev-auth-key-salt-change-me'
  dwVerificationCodeSalt: 'dev-verification-code-salt-change-me'
test:
  database: 'dartway_test_pw'
  serviceSecret: 'test-service-secret'
  dwAuthKeySalt: 'test-auth-key-salt'
  dwVerificationCodeSalt: 'test-verification-code-salt'
