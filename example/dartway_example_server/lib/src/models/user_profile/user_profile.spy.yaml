class: UserProfile
table: user_profile
fields:
  # Login identifier required by DartWay auth (see DwCore on the server). Holds
  # the phone number for this example.
  userIdentifier: String
  phone: String
  
  agreedForMarketingCommunications: bool
  conditionsAcceptedAt: DateTime

  firstName: String
  lastName: String?
  imageUrl: String?
  gender: UserGender?