name: dartway_example_flutter
description: A new Flutter project with Serverpod.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  serverpod_flutter: 3.4.11
  dartway_example_client:
    path: ../dartway_example_client

  flutter_hooks: ^0.21.2
  hooks_riverpod: ^3.0.0
  freezed_annotation: ^3.0.0
  riverpod_annotation: ^3.0.0

  # UI-kit dependencies: the kit lives in this app's `lib/ui_kit/`, so its
  # packages belong to the app, not to the framework.
  device_frame: ^1.4.0

  dartway_flutter:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_flutter

  dartway_router: ^1.1.1

  dartway_serverpod_core_flutter:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_serverpod_core/dartway_serverpod_core_flutter

  dartway_studio_bridge:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_studio_bridge

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.5
  gap: ^3.0.1
  pin_code_fields: ^8.0.1
  flutter_multi_formatter: ^2.13.8
  collection: ^1.19.1


dev_dependencies:
  flutter_lints: '>=3.0.0 <7.0.0'
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.11
  freezed: ^3.0.0
  riverpod_generator: ^3.0.0
  flutter_gen_runner: ^5.10.0

  dartway_cli:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_cli

  # The UI-kit law is enforced here, not just written down: raw Color/TextStyle/
  # BorderRadius and direct theme access outside `ui_kit/` are lints. Needs
  # `analyzer: plugins: [custom_lint]` in analysis_options.yaml, and runs in the
  # IDE and via `dart run custom_lint`.
  custom_lint: ^0.8.0
  dartway_lints:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_lints

# Внутри монорепо темплейт собирается против ЛОКАЛЬНЫХ пакетов фреймворка.
# При копировании в самостоятельный проект — удалить весь блок dependency_overrides.
dependency_overrides:
  dartway_flutter:
    path: ../../packages/dartway_flutter
  dartway_serverpod_core_flutter:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_flutter
  dartway_serverpod_core_client:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_client
  dartway_serverpod_core_shared:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_shared
  dartway_studio_bridge:
    path: ../../packages/dartway_studio_bridge
  dartway_cli:
    path: ../../packages/dartway_cli
  dartway_lints:
    path: ../../packages/dartway_lints


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter_native_splash:
  color: "#05060C"                
  image: assets/dartway_splash_logo.png

  android: true
  ios: true
  web: true

  android_12:
    image: assets/dartway_splash_logo.png
    icon_background_color: "#05060C"

flutter_gen:
  output: lib/ui_kit/gen/
  integrations:
    image: true
    flutter_svg: true

# The following section is specific to Flutter.
flutter:
  generate: true # gen-l10n (see l10n.yaml); output is checked in under lib/l10n/gen

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
