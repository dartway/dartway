name: dartway_starter_client
description: Starting point for a Serverpod client.

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  serverpod_client: ^3.4.8

  dartway_serverpod_core_client: ^0.1.0

# Внутри монорепо — локальная сборка. В самостоятельном проекте удалить блок.
dependency_overrides:
  dartway_serverpod_core_client:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_client
