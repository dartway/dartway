# Local development and test secrets for the DartWay example app.
#
# These are throwaway values for a public sample project and are committed on
# purpose, so that `docker compose up` + `dart test` work out of the box. A real
# app keeps this file out of version control and injects secrets per environment.
development:
  database: 'dartway_dev_pw'
  serviceSecret: 'dev-service-secret-change-me'
  # Salts required by DartWay auth (see DwAuthConfig on the server).
  dwAuthKeySalt: 'dev-auth-key-salt-change-me'
  dwVerificationCodeSalt: 'dev-verification-code-salt-change-me'

# Matches the `postgres_test` service in docker-compose.yaml (localhost:9090).
test:
  database: 'dartway_test_pw'
  serviceSecret: 'test-service-secret'
  dwAuthKeySalt: 'test-auth-key-salt'
  dwVerificationCodeSalt: 'test-verification-code-salt'
