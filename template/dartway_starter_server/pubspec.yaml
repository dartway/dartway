name: dartway_starter_server
description: Starting point for a Serverpod server.
# version: 1.0.0
# homepage: https://www.example.com

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  serverpod: ^3.4.8

  dartway_serverpod_core_server:
    git:
      url: https://github.com/dartway/dartway.git
      ref: master
      path: packages/dartway_serverpod_core/dartway_serverpod_core_server

  http: ^1.5.0



dev_dependencies:
  lints: ^6.0.0
  test: '^1.24.2'
  serverpod_test: ^3.4.8
  # Only the integration suite needs it: the fake "old backend" whose hashes the
  # legacy-verifier test migrates away from.
  crypto: ^3.0.0

# Внутри монорепо темплейт собирается против ЛОКАЛЬНЫХ пакетов фреймворка.
# При копировании в самостоятельный проект — удалить весь блок dependency_overrides
# (зависимости поедут из git, объявленного выше).
dependency_overrides:
  dartway_serverpod_core_server:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_server
  dartway_serverpod_core_shared:
    path: ../../packages/dartway_serverpod_core/dartway_serverpod_core_shared
